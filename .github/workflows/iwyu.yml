name: IWYU

on: workflow_dispatch

jobs:
  linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: build include-what-you-use
      run: |
        git clone --depth=1 --single-branch --branch clang_18 https://github.com/include-what-you-use/include-what-you-use.git
        cd include-what-you-use
        cmake -DCMAKE_PREFIX_PATH=/usr/lib/llvm-18 -B build
        cmake --build build
    - name: configure
      run: CXX=clang++-18 cmake -Werror=dev -D CMAKE_BUILD_TYPE=Release -D CMAKE_CXX_INCLUDE_WHAT_YOU_USE="include-what-you-use/build/include-what-you-use" -B build
    - name: run include-what-you-use
      run: cmake --build build
